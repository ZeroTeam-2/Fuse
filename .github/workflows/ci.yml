name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # nuxt.config.ts валидирует env уже на этапе typecheck (и тесты читают тот
      # же .env). В CI настоящего .env нет — берём плейсхолдеры из .env.example,
      # чтобы набор переменных не разъезжался со схемой config/env.schema.ts.
      - name: Prepare env
        run: cp .env.example .env

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
