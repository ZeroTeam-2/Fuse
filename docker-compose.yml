# MongoDB не поднимается как сервис — подключение задаётся переменной
# MONGODB_URL (например, внешний кластер или mongo на хосте через
# host.docker.internal). Переменные читаются из .env в корне репозитория.
#
# Единственная точка входа — caddy (http://localhost:${HTTP_PORT:-80}):
#   /api/* проксируется в backend, остальное — во frontend.
services:
  caddy:
    image: caddy:2-alpine
    container_name: fuse-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fuse-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
    expose:
      - "3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: fuse-frontend
    restart: unless-stopped
    environment:
      # same-origin: браузер ходит на /api/* через caddy
      # (значение из .env намеренно не используется — оно для локальной разработки)
      NUXT_PUBLIC_API_BASE_URL: /
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET:?NUXT_SESSION_SECRET is required}
    expose:
      - "3000"
    depends_on:
      - backend
