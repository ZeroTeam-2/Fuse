# Инфраструктура для локальной разработки: MongoDB, MinIO, LocalStack (SQS).
# Для production-деплоя используется отдельный compose (переменные окружения
# задают подключение к внешним сервисам).
#
# Единая точка входа — caddy (http://localhost:${HTTP_PORT:-8081}):
#   /api/* проксируется в backend, остальное — во frontend.
services:
  # ─── Infrastructure ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: fuse-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-fuse}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-fusepassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-fuse}
    ports:
      - "27018:27017"
    volumes:
      - fuse-mongo-data:/data/db

  localstack:
    # latest (2026.x) требует LOCALSTACK_AUTH_TOKEN; 4.7 — последний community-образ
    image: localstack/localstack:4.7.0
    container_name: fuse-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
    volumes:
      - ./docker/localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh

  minio:
    image: minio/minio:latest
    container_name: fuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      S3_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      S3_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fuse-minio-data:/data

  # ─── Application ─────────────────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    container_name: fuse-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8081}:8081"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fuse-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      MONGODB_URL: mongodb://${MONGO_USER:-fuse}:${MONGO_PASSWORD:-fusepassword}@mongo:27017/${MONGO_DB:-fuse}?authSource=admin
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-http://localstack:4566/000000000000/scenario-execution}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      S3_URL: ${S3_URL:-minio}
      S3_PORT: "9000"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-fuse}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-}
      APP_URL: ${APP_URL:-http://localhost:${HTTP_PORT:-8081}}
    expose:
      - "3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_started
      localstack:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: fuse-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: /
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET:?NUXT_SESSION_SECRET is required}
    expose:
      - "5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fuse-mongo-data:
  fuse-minio-data:
