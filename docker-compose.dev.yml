# Инфраструктура для локальной разработки: MongoDB, LocalStack (SQS), MinIO.
#
# Здесь ТОЛЬКО инфраструктура. Фронтенд и бэкенд запускаются на хосте
# (`pnpm dev`) с hot-reload и ходят в эти контейнеры через localhost:
#
#   pnpm infra                        # поднять инфраструктуру
#   cp .env.local.example .env.local  # включить локальный профиль окружения
#   pnpm dev                          # фронт и бэк на хосте
#
# Полный стек в докере (backend + frontend + caddy) — это docker-compose.yml.
#
# Порты на хосте: mongo 27018, sqs 4566, s3 9000, консоль minio 9001.
#
# ВАЖНО: значения ниже намеренно захардкожены и НЕ берутся из ${...}.
# Docker Compose автоматически читает корневой .env (но не .env.local), а там
# лежат БОЕВЫЕ креды и имя прод-бакета — при интерполяции локальный MinIO
# поднимался с прод-ключами и прод-именем бакета. Это локальная инфраструктура:
# креды фиксированные и должны совпадать с .env.local.example.
services:
  mongo:
    image: mongo:7
    container_name: fuse-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: fuse
      MONGO_INITDB_ROOT_PASSWORD: fusepassword
      MONGO_INITDB_DATABASE: fuse
    ports:
      # 27018 на хосте, чтобы не конфликтовать с системным mongod на 27017.
      - "27018:27017"
    volumes:
      - fuse-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  localstack:
    # latest (2026.x) требует LOCALSTACK_AUTH_TOKEN; 4.7 — последний community-образ
    image: localstack/localstack:4.7.0
    container_name: fuse-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
    volumes:
      - ./docker/localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh
    healthcheck:
      # Готовность = очередь реально создана init-скриптом, а не "контейнер поднялся".
      test: ["CMD-SHELL", "awslocal sqs get-queue-url --queue-name scenario-execution || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: fuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Мок внешнего API: на него смотрит baseUrl сид-приложения, чтобы api-шаги
  # сценариев исполнялись против локального эндпоинта, а не чужого сервиса.
  mock-api:
    image: mccutchen/go-httpbin:v2.15.0
    container_name: fuse-mock-api
    restart: unless-stopped
    ports:
      - "8085:8080"

  # Одноразовый бутстрап: создаёт бакет и завершается. Идемпотентен.
  minio-init:
    image: minio/mc:latest
    container_name: fuse-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: fuse
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    volumes:
      - ./docker/minio/init-bucket.sh:/init-bucket.sh:ro

volumes:
  fuse-mongo-data:
  fuse-minio-data:
